            padding: 100px;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .menu {

            margin: 10px;
        }

        .nav.menu {
            list-style: none;
            text-decoration: none;

        }

        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container.nav .menu {
            list-style: none;
        }
    </style>
</head>

<body>

            </ul>

            <label for="">login</label>

        </div>
    </div>
    <div class="content">


        <div class="image"><img src="workstation image.png" alt="">coding</div>
        <div class="image"><img src="graphic.jpg" alt="">design</div>
    </div>
